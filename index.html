<script>
  let noClicks = 0;

  const messages = [
    "Are you sure? 🥺",
    "Please?",
    "Pretty please?",
    "I’m really sorry, my love ❤️",
    "I promise I’ll do better.",
    "You mean so much to me.",
    "I hate that I made you feel this way.",
    "Please forgive me? 🥺",
    "Okay, now you’re breaking my heart 💔",
    "I’ll keep saying sorry until you smile.",
    "I miss your smile.",
    "Last chance before the No button gives up 😭"
  ];

  const gifs = [
    "https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif",
    "https://media.tenor.com/4Ijycn6xFzUAAAAj/mochi-peachcat-cute.gif",
    "https://media.tenor.com/V3cJtZJ3gJMAAAAj/peach-goma.gif",
    "https://media.tenor.com/Fm3_oNnjUjYAAAAj/tkthao219-bubududu.gif",
    "https://media.tenor.com/Bx9Q2o2ZqMYAAAAj/sad-bear.gif",
    "https://media.tenor.com/WpC7f2PpfAQAAAAj/bubu-dudu.gif",
    "https://media.tenor.com/K8cMJU4S5eMAAAAj/sad-cat.gif",
    "https://media.tenor.com/0AVbKGY_MxMAAAAj/crying-bubu.gif",
    "https://media.tenor.com/UcI-3acSXEcAAAAj/bubu-dudu-sseeyall.gif",
    "https://media.tenor.com/MKX6PzRijUQAAAAj/peachcat-sad.gif",
    "https://media.tenor.com/Y9g6ZPdlxLMAAAAj/cute-sad.gif",
    "https://media.tenor.com/8wBCqZH60U8AAAAj/peach-goma-sad.gif"
  ];

  function no() {
    const message = document.getElementById("message");
    const gif = document.getElementById("gif");
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    if (noClicks < messages.length) {
      message.innerText = messages[noClicks];
      gif.src = gifs[noClicks];

      let noSize = 18 - noClicks * 1.5;
      let noPadding = 14 - noClicks * 1.2;

      noBtn.style.fontSize = Math.max(noSize, 7) + "px";
      noBtn.style.padding =
        Math.max(noPadding, 3) + "px " + Math.max(noPadding + 8, 5) + "px";

      let yesSize = 18 + noClicks * 2.5;
      let yesPadding = 14 + noClicks * 1.5;

      yesBtn.style.fontSize = yesSize + "px";
      yesBtn.style.padding = yesPadding + "px " + (yesPadding + 10) + "px";

      noClicks++;
    } else {
      message.innerText = "Okay, the No button has retired. Only one choice now ❤️";
      gif.src = "https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif";
      noBtn.style.display = "none";

      yesBtn.style.fontSize = "34px";
      yesBtn.style.padding = "22px 38px";
    }
  }

  function yes() {
    document.body.innerHTML = `
      <div style="text-align:center; padding:30px; font-family:Arial; background:#ffe6ec; min-height:100vh;">
        <img src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" style="width:230px; max-width:90%; margin-top:40px;">
        <h1 style="color:#d6336c;">Thank you, my love ❤️</h1>
        <p style="font-size:20px;">I promise I’ll do better.</p>
        <p style="font-size:20px;">You are so important to me, and I never want to lose you.</p>
      </div>
    `;
  }
</script>
