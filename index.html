<!DOCTYPE html>
<html>
<head>
  <title>I'm Sorry</title>
  <style>
    body {
      background: #ffe6ec;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    .container { margin-top: 35px; }
    img { width: 230px; max-width: 90%; }
    h1 { color: #d6336c; }
    #message { font-size: 21px; margin: 20px auto; max-width: 350px; }
    button {
      padding: 14px 24px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
    }
    #yesBtn { background: #ff4d6d; color: white; }
    #noBtn { background: white; color: #ff4d6d; border: 2px solid #ff4d6d; }
  </style>
</head>

<body>
  <div class="container">
    <img id="gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif">
    <h1>I'm sorry, my love ❤️</h1>
    <p id="message">I know I hurt you, and I truly regret it. Can you forgive me?</p>

    <button id="yesBtn" onclick="yes()">Yes ❤️</button>
    <button id="noBtn" onclick="no()">No</button>
  </div>

  <script>
    let noClicks = 0;

    const messages = [
      "Are you sure? 🥺",
      "Please?",
      "Pretty please?",
      "I’m really sorry, my love ❤️",
      "I promise I’ll do better.",
      "You mean so much to me.",
      "I hate that I made you feel this way.",
      "Please forgive me? 🥺",
      "Okay, now you’re breaking my heart 💔",
      "I miss your smile.",
      "Last chance before the No button disappears 😭"
    ];

    const gifs = [
"https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif",
"https://media.tenor.com/Fm3_oNnjUjYAAAAj/tkthao219-bubududu.gif",
"https://media.tenor.com/WpC7f2PpfAQAAAAj/bubu-dudu.gif",
"https://media.tenor.com/0AVbKGY_MxMAAAAj/crying-bubu.gif",
"https://media.tenor.com/Fm3_oNnjUjYAAAAj/tkthao219-bubududu.gif",
"https://media.tenor.com/WpC7f2PpfAQAAAAj/bubu-dudu.gif",
"https://media.tenor.com/0AVbKGY_MxMAAAAj/crying-bubu.gif",
"https://media.tenor.com/Fm3_oNnjUjYAAAAj/tkthao219-bubududu.gif",
"https://media.tenor.com/WpC7f2PpfAQAAAAj/bubu-dudu.gif",
"https://media.tenor.com/0AVbKGY_MxMAAAAj/crying-bubu.gif",
"https://media.tenor.com/Fm3_oNnjUjYAAAAj/tkthao219-bubududu.gif"
];

    function no() {
      const message = document.getElementById("message");
      const gif = document.getElementById("gif");
      const noBtn = document.getElementById("noBtn");
      const yesBtn = document.getElementById("yesBtn");

      if (noClicks < messages.length) {
        message.innerText = messages[noClicks];
        gif.src = gifs[noClicks];

        noBtn.style.transform = "scale(" + Math.max(0.25, 1 - noClicks * 0.08) + ")";
        yesBtn.style.transform = "scale(" + (1 + noClicks * 0.08) + ")";

        noClicks++;
      } else {
        message.innerText = "I guess the No button gave up before I did 🥺❤️";
       gif.src = "https://media.tenor.com/0AVbKGY_MxMAAAAj/crying-bubu.gif";
        noBtn.style.display = "none";
        yesBtn.style.fontSize = "34px";
        yesBtn.style.padding = "22px 38px";
      }
    }

    function yes() {
      document.body.innerHTML =
        '<div style="text-align:center; padding:30px; font-family:Arial; background:#ffe6ec; min-height:100vh;">' +
        '<img src="https://media.tenor.com/eNHbizSfVb0AAAAj/lovemode-cute.gif" style="width:230px; max-width:90%; margin-top:40px;">' +
        '<h1 style="color:#d6336c;">Thank you, my love ❤️</h1>' +
        '<p style="font-size:20px;">I promise I’ll do better.</p>' +
        '<p style="font-size:20px;">You are so important to me, and I never want to lose you.</p>' +
        '</div>';
    }
  </script>
</body>
</html>
